name: Build Desktop

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.29.2"

      - name: Fix dependencies
        shell: pwsh
        run: |
          flutter pub add dev:flutter_lints:^5.0.0 --no-example 2>$null; $true
          flutter pub add dev:build_runner:^2.4.13 --no-example 2>$null; $true

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath OpenIM-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: OpenIM-Windows
          path: OpenIM-Windows.zip
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.29.2"

      - name: Fix dependencies
        run: |
          flutter pub add dev:flutter_lints:^5.0.0 --no-example || true
          flutter pub add dev:build_runner:^2.4.13 --no-example || true

      - run: flutter pub get

      - run: flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r OpenIM-macOS.zip openim.app

      - uses: actions/upload-artifact@v4
        with:
          name: OpenIM-macOS
          path: build/macos/Build/Products/Release/OpenIM-macOS.zip
          retention-days: 7
