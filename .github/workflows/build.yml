name: Build Desktop

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Fix pubspec.yaml
        run: |
          python -c "
import re
with open('pubspec.yaml', encoding='utf-8') as f: c = f.read()
c = re.sub(r'flutter_lints: ..6.0.0', 'flutter_lints: ^5.0.0', c)
c = re.sub(r'build_runner: ..2.4.15', 'build_runner: ^2.4.13', c)
with open('pubspec.yaml', 'w', encoding='utf-8') as f: f.write(c)
print([l for l in c.splitlines() if 'flutter_lints' in l or 'build_runner' in l])
"

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath OpenIM-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: OpenIM-Windows
          path: OpenIM-Windows.zip
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Fix pubspec.yaml
        run: |
          sed -i.bak 's/flutter_lints: .6.0.0/flutter_lints: ^5.0.0/' pubspec.yaml
          sed -i.bak 's/build_runner: .2.4.15/build_runner: ^2.4.13/' pubspec.yaml
          sed -i.bak 's/livekit_client: .2.5.0/livekit_client: ^2.5.1/' pubspec.yaml
          grep -E 'flutter_lints|build_runner|livekit' pubspec.yaml

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - run: flutter create --platforms=macos .
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r $GITHUB_WORKSPACE/OpenIM-macOS.zip openim.app

      - uses: actions/upload-artifact@v4
        with:
          name: OpenIM-macOS
          path: OpenIM-macOS.zip
          retention-days: 7
