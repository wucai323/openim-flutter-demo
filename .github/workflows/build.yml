name: Build Desktop

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Fix pubspec.yaml
        shell: pwsh
        run: |
          $c = Get-Content pubspec.yaml -Raw
          $c = $c -replace 'flutter_lints: \^6\.0\.0', 'flutter_lints: ^5.0.0'
          $c = $c -replace 'build_runner: \^2\.4\.15', 'build_runner: ^2.4.13'
          $c | Set-Content pubspec.yaml -NoNewline
          Write-Host "flutter_lints line: $(Select-String 'flutter_lints' pubspec.yaml)"

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath OpenIM-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: OpenIM-Windows
          path: OpenIM-Windows.zip
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Fix pubspec.yaml
        run: |
          python3 -c "
import re, sys
with open('pubspec.yaml') as f: c = f.read()
c = re.sub(r'flutter_lints: \.\^6\.0\.0', 'flutter_lints: ^5.0.0', c)
c = re.sub(r'build_runner: \.\^2\.4\.15', 'build_runner: ^2.4.13', c)
with open('pubspec.yaml','w') as f: f.write(c)
print([l for l in c.splitlines() if 'flutter_lints' in l or 'build_runner' in l])
"

      - run: flutter pub get

      - run: flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r OpenIM-macOS.zip openim.app

      - uses: actions/upload-artifact@v4
        with:
          name: OpenIM-macOS
          path: build/macos/Build/Products/Release/OpenIM-macOS.zip
          retention-days: 7
