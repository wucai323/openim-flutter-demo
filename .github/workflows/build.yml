name: Build Desktop

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Init Windows platform
        shell: pwsh
        run: |
          flutter create --platforms=windows .
          if ($LASTEXITCODE -ne 0) { exit 0 }

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath OpenIM-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: OpenIM-Windows
          path: OpenIM-Windows.zip
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Init macOS platform
        run: flutter create --platforms=macos . || true

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r $GITHUB_WORKSPACE/OpenIM-macOS.zip openim.app

      - uses: actions/upload-artifact@v4
        with:
          name: OpenIM-macOS
          path: OpenIM-macOS.zip
          retention-days: 7
